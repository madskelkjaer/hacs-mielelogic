# Generel travlhed: ugedag (kolonner) x klokkeslæt (rækker), aggregeret over
# 90 dages langtidsstatistik. Farve = gns. antal maskiner i brug.
# apexcharts-card 2.2.3 -> heatmap tvinges via apex_config; data hentes med
# data_generator (cachet i window, så statistikken kun hentes én gang).
# Skift 'entity' i ALLE serier for et andet vaskeri.

type: custom:apexcharts-card
graph_span: 1d
header:
  show: true
  title: "Travlhed – Finlandsgade (ugedag × time)"
  show_states: false
apex_config:
  chart:
    type: heatmap
    height: 520
  dataLabels:
    enabled: false
  plotOptions:
    heatmap:
      radius: 2
      colorScale:
        ranges:
          - { from: 0, to: 0, color: "#1f2933", name: ledig }
          - { from: 0.01, to: 0.99, color: "#f6c744", name: lidt }
          - { from: 1, to: 2.99, color: "#f59e0b", name: en del }
          - { from: 3, to: 99, color: "#dc2626", name: travlt }
series:
  - name: "23"
    entity: sensor.finlandsgade_maskiner_i_brug
    data_generator: |
      const H = 23;
      const ent = entity.entity_id;
      const key = '__mlstat_' + ent;
      if (!window[key]) {
        const start = new Date(); start.setDate(start.getDate() - 90);
        window[key] = hass.callWS({ type: 'recorder/statistics_during_period',
          start_time: start.toISOString(), statistic_ids: [ent], period: 'hour' })
          .then(r => (r && r[ent]) ? r[ent] : []).catch(() => []);
      }
      const rows = await window[key];
      const days = [1,2,3,4,5,6,0];
      const names = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
      const sum = {}, cnt = {};
      for (const x of rows) { const d = new Date(x.start); if (d.getHours() !== H) continue;
        const wd = d.getDay(); sum[wd] = (sum[wd]||0) + (x.mean==null?0:x.mean); cnt[wd] = (cnt[wd]||0) + 1; }
      return days.map((wd, i) => ({ x: names[i], y: cnt[wd] ? Number((sum[wd]/cnt[wd]).toFixed(3)) : 0 }));
